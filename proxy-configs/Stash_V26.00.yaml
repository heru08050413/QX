# ============================================================
#  Stash 配置 — V26.00 (纳入四套统一版本体系; 前身 v4.0)
#
#  V26.00 修复 (2026-07-03 审查, 依据见 git log / CLAUDE.md):
#    [H1] 台湾组 filter 去掉 🇨🇳 与单字"台|湾":
#         🇨🇳 是机场回国/国内中转节点常用标记, 单字"台"会命中"台州中转"
#         等国内节点 → 国内节点混入台湾池 → Bahamut(锁台湾IP)直接死.
#         对齐四套已规避的写法(台北|新北|彰化, 无单字无🇨🇳).
#    [M1] GEOIP,CN,DIRECT 补 no-resolve: 原写法强制用国内 DoH(无 fallback)
#         解析未命中域名, 被污染域名可能拿国内 IP → 误判 CN → 直连死.
#         补后未解析域跳过 GEOIP 落 MATCH(默认代理)更安全; 纯 IP 连接
#         (微信 VOIP UDP)不受影响.
#    [M2] fake-ip-filter 补路由器/NAS 管理域: 否则拿 fake-ip 后真实解析
#         走公共 DoH 返回厂商公网导航 IP, 路由器后台打不开.
#    [M3] url-test interval 300→600 / tolerance 100→200: 四套真实日志
#         实证 5 分钟高频测速+低容差会致长连接漂移风控且费电.
#    [L1] rules 顶部补 qq.com.cn / teg.tencent-cloud.net 直连保护:
#         qq.com 不是 qq.com.cn 的后缀(四套微信 loading 血案的同款盲区),
#         dns.weixin.qq.com.cn 原本靠 GEOIP 解析兜底, 现显式保护.
#    [L3] 显式声明 enhanced-mode: fake-ip / ipv6: false (原隐式默认);
#         台湾组图标 China.png → Taiwan.png.
#  供应链注记: 27 个规则源全部来自 Coldvvater/Mononoke 单一个人仓库,
#    已纳入 scripts/url-health-sweep.sh 巡检(2026-07-03 全 200, Reject
#    实测不含微信/微博功能域). 若该仓库重构, 巡检会报警.
#
#  ── 以下为 v4.0 原始说明 ──
#  改动:
#    - benchmark-url: gstatic(国内被墙) -> cp.cloudflare.com
#    - 地区组从 select套三策略 拍平为直接 url-test (修手动测速无反应)
#    - 删除全部 fallback/load-balance (修 IP 跳动导致的时连时断)
#    - 保留全部业务分组
#  换机场只改: proxy-providers.Subscribe.url
# ============================================================

mode: rule
log-level: info
# V26.00 [L3] 显式关闭 IPv6 (对齐四套: 双栈解析翻倍且家用 IPv6 质量差)
ipv6: false
dns:
  # V26.00 [L3] 显式声明 fake-ip 模式 (原依赖 Stash 默认, 隐式默认将来读不懂)
  enhanced-mode: fake-ip
  ipv6: false
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fake-ip-filter:
  - '*'
  - +.lan
  - +.local
  - +.cmpassport.com
  - id6.me
  - open.e.189.cn
  - mdn.open.wo.cn
  - opencloud.wostore.cn
  - auth.wosms.cn
  - +.10099.com.cn
  - +.msftconnecttest.com
  - +.msftncsi.com
  - lancache.steamcontent.com
  - time.apple.com
  - time.windows.com
  - time.android.com
  - pool.ntp.org
  - +.ntp.org
  # V26.00 [M2] 路由器/NAS 管理域必须拿真实(内网)IP, 不能进 fake-ip
  - +.miwifi.com
  - +.tplogin.cn
  - +.tplinkwifi.net
  - +.tplinklogin.net
  - +.routerlogin.net
  - +.orbilogin.com
  - +.melogin.cn
  - +.falogin.cn
  - router.asus.com
  - router.synology.com
