rules:
# V26.00 [L1] 微信 .com.cn 保护区 (最先匹配, 对齐四套安全基线 §一.2):
#   qq.com 不是 qq.com.cn 的后缀 — dns.weixin.qq.com.cn (微信自研 DNS)
#   原本不被任何域名规则命中, 靠 GEOIP 解析兜底. 显式直连, 省解析且
#   防上游列表未来变化 (四套"微信 loading 血案"的同款盲区).
- DOMAIN-SUFFIX,qq.com.cn,DIRECT
- DOMAIN-SUFFIX,teg.tencent-cloud.net,DIRECT
- RULE-SET,Direct,DIRECT
- RULE-SET,Reject,REJECT
- RULE-SET,AI,AI
- RULE-SET,YouTube,YouTube
- RULE-SET,Netflix,Netflix
- RULE-SET,Disney+,Disney+
- RULE-SET,Emby,Emby
- RULE-SET,TikTok,TikTok
- RULE-SET,Bahamut,台湾节点
- RULE-SET,BiliIntl,国际媒体
- RULE-SET,bilibili,bilibili
- RULE-SET,Spotify,Spotify
- RULE-SET,NetEaseMusic,网易音乐
- RULE-SET,ProxyMedia,国际媒体
- RULE-SET,WeChat,DIRECT
- RULE-SET,Telegram,Telegram
- RULE-SET,Twitter,Twitter
- RULE-SET,GitHub,国外网站
- RULE-SET,Google,谷歌服务
- RULE-SET,Microsoft,微软服务
- RULE-SET,Games,游戏平台
- RULE-SET,ProxyGFW,国外网站
- RULE-SET,AppleCN,DIRECT
- RULE-SET,AppleServers,苹果服务
- RULE-SET,CN_Mainland,DIRECT
- RULE-SET,LAN,DIRECT
# V26.00 [M1] 补 no-resolve: 不为 GEOIP 匹配强制解析域名 (仅国内 DoH 无
#   fallback, 被污染域名可能拿国内 IP → 误判 CN → 直连死). 未解析域名
#   跳过本条落 MATCH(默认代理)更安全; 纯 IP 连接(微信 VOIP)不受影响.
- GEOIP,CN,DIRECT,no-resolve
- MATCH,漏网之鱼
