      policy: REJECT
      update_interval: 86400

  # ── 4. Apple 国内 CDN → 直连 ──
  - domain_suffix:
      match: apple-dns.net
      policy: DIRECT
  - domain_suffix:
      match: aaplimg.com
      policy: DIRECT
  - domain_suffix:
      match: mzstatic.com
      policy: DIRECT
  - domain_suffix:
      match: icloud.com.cn
      policy: DIRECT
  - domain_suffix:
