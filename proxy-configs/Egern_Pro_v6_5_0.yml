# =====================================================================
# 规则 (Rules) — 自上而下匹配, 首个命中即生效
# ---------------------------------------------------------------------
# 0  局域网/私网 → 直连
# 0.5 微信 VOIP 保护(udp+CN, 精确版)
# 1  微博/新浪保护区 → 直连
# 2  REJECT 风暴熔断(高频重试源 REJECT-DROP)
# 3  广告/隐私拦截 → REJECT
# 4  Apple 国内 CDN → 直连
# 5  字节系国内 → 直连(必在 TikTok 规则集前)
# 6  AI → AI/Gemini
# 7  流媒体  8 通讯  9 开发  10 大厂  11 国内服务  12 Final
# =====================================================================
rules:
  # ── 0. 局域网/私网 → 直连 ──
  - domain_suffix:
      match: local
      policy: DIRECT
  - domain_suffix:
      match: localhost
      policy: DIRECT
  - ip_cidr:
      match: 10.0.0.0/8
      policy: DIRECT
      no_resolve: true
  - ip_cidr:
      match: 127.0.0.0/8
      policy: DIRECT
      no_resolve: true
  - ip_cidr:
      match: 169.254.0.0/16
      policy: DIRECT
      no_resolve: true
  - ip_cidr:
      match: 172.16.0.0/12
      policy: DIRECT
      no_resolve: true
  - ip_cidr:
      match: 192.168.0.0/16
      policy: DIRECT
      no_resolve: true
  - ip_cidr:
      match: 224.0.0.0/4
      policy: DIRECT
      no_resolve: true
  - ip_cidr6:
      match: fe80::/10
      policy: DIRECT
      no_resolve: true
  - ip_cidr6:
      match: fc00::/7
      policy: DIRECT
      no_resolve: true

  # ── 0.2: 路由器/NAS 管理后台 → 直连 (v6.4.0, 配合 DNS 层 0.1) ──
  #   确保管理流量留在局域网, 不被代理. 与 DNS 层 system 解析配套.
  - domain_suffix:
      match: miwifi.com
      policy: DIRECT
  - domain_suffix:
      match: tplogin.cn
      policy: DIRECT
  - domain_suffix:
      match: tplinkwifi.net
      policy: DIRECT
  - domain:
      match: router.asus.com
      policy: DIRECT
  - domain_suffix:
      match: routerlogin.net
      policy: DIRECT
  - domain_suffix:
      match: tendawifi.com
      policy: DIRECT
  - domain_suffix:
      match: melogin.cn
      policy: DIRECT
  - domain_suffix:
      match: falogin.cn
      policy: DIRECT
  - domain:
      match: router.synology.com
      policy: DIRECT
  - domain:
      match: unifi.local
      policy: DIRECT
  #
  # 旧配置: 裸 `geoip CN no_resolve:true`, 对所有目标=CN IP 的连接直连.
  #   风险: "自行解析后用 IP 直连"的境外服务, 其 CDN/anycast 边缘 IP 偶
  #   被 GeoIP 判成 CN ⇒ 被误直连, 绕过后面所有代理规则, 且难排查.
  #
  # 本版: 用官方 `and` 逻辑规则同时要求 [protocol=udp] 且 [geoip=CN],
  #   仅当"国内 IP 的 UDP 包"才前置直连. 微信 VOIP 媒体流正是 udp+国内 IP,
  #   保护不减; 而网页/App 的境外 HTTPS 都是 TCP, 不再被这条误伤.
  #
  # 语法依据(官方 egernapp.com/docs/configuration/rules): 逻辑规则顶层
  #   key 为 and/or/not, 其下 match: 接子规则列表, policy/name 与普通规则
  #   同级. 子条件用 protocol(支持 tcp/udp/http/https/quic/stun)与 geoip.
  #
  # 关于 no_resolve: 官方文档明确 no_resolve 仅作用于 IP 类规则
  #   (geoip/ip_cidr/ip_cidr6/asn). 此处不在子条件里写 no_resolve —
  #   因为 protocol=udp 这个前置条件已保证只命中"已拿到 IP 的 UDP 连接"
  #   (VOIP 不会对域名发 UDP), 无解析触发, 故无需也不应在嵌套里塞它.
  #
  # 已知副作用(诚实标注): 这条会让所有"目标=国内 IP 的 UDP"走直连,
  #   不止微信 VOIP, 还包括国内游戏 UDP 对战/国内 App 的 QUIC/国内 WebRTC.
  #   这些本就该直连, 方向正确. 唯一边缘风险: 若你有"国内 IP 却想走代理
  #   的 UDP 服务"(罕见), 会被此条拦截 — 如有此需求请删本条或加例外.
  #
  # 为何不用"腾讯 ASN": 腾讯 AS132203/AS45090 国内外网段混编且含
  #   anycast, 按 ASN 锁定要么漏 VOIP(走了表外网段)要么误伤境外腾讯
  #   节点. udp+CN 组合比 ASN 边界更稳, 也不依赖 ASN 库精度.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - and:
      match:
        - protocol:
            match: udp
        - geoip:
            match: CN
      policy: DIRECT
      name: 国内 UDP 前置直连 (微信 VOIP 保护)

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 0.6 YouTube 去广告 — 强制 googlevideo + youtubei 走 TCP (v6.3.0)
  #
  # 对齐 Maasea YouTube.Enhance 模块的【实际要求】(经核验模块最新源码):
  #   模块自带两条规则 AND(googlevideo.com,UDP)REJECT 与
  #   AND(youtubei.googleapis.com,UDP)REJECT, 强制二者走 TCP. 这是去广告
  #   生效的【前提】: 只有走 TCP, MITM 才能解密 youtubei 响应(界面广告),
  #   且 URL-rewrite 才能拦 googlevideo 的 initplayback&oad 广告流.
  #
  # v6.2.0 及之前的缺陷: 只 reject 了 youtubei 的 QUIC, 漏了 googlevideo,
  #   且 MITM 把 *.googlevideo.com 整个 exclude → 模块的广告流拦截规则
  #   完全触不到 → 这就是"浮窗能用(youtubei改写成功)、去广告失败
  #   (googlevideo广告流拦不到)"的根因. v6.3.0 修正.
  #
  # ★ 能效(诚实标注): googlevideo 纳入处理后, 视频流连接会多一次
  #   QUIC→TCP 的【握手解密】(为让 URL-rewrite 读到 URL). 这是"小幅"
  #   增加, 【不解密视频 body】(几百 MB 的视频本体不碰). 正常视频流
  #   (videoplayback?)被 URL-rewrite 正则排除, 正常传输, 不受影响.
  #
  # ☆ 效果边界(务实): 此方案拦【独立广告流 &oad】+【youtubei 界面广告
  #   位】, 对绝大多数移动端前贴广告有效. 但拼进 videoplayback 流的
  #   SSAI(服务端拼接)广告仍拦不掉 — 那需解 body, 全球 MITM 方案皆无解.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - and:
      match:
        - domain_suffix:
            match: googlevideo.com
        - protocol:
            match: quic
      policy: REJECT
      name: YouTube 视频流禁 QUIC (强制 TCP 保广告流拦截)
  - and:
      match:
        - domain:
            match: youtubei.googleapis.com
        - protocol:
            match: quic
      policy: REJECT
      name: YouTube API 禁 QUIC (强制 TCP 保 MITM 解密)

  # [H2] youtubei.googleapis.com 的 TCP 流量硬编码路由到 YouTube 组.
  #   原先此域 TCP 路由仅靠远程 YouTube.list 收录(DOMAIN-SUFFIX,
  #   youtubei.googleapis.com); 一旦规则集改版删除该条, 去广告会'静默
  #   失效'(无报错, 广告悄悄回来). 硬编码后此链自包含, 不依赖外部结构.
  #   必须放在 Gemini/Google rule_set 之前, 否则可能被 googleapis 泛匹配
  #   抢先路由到错误策略组.
  - domain:
      match: youtubei.googleapis.com
      policy: YouTube

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 0.7 YouTube 广告流 / 统计信标拦截 (v6.3.0, url_regex 精确匹配)
  #
  # 对齐 Maasea 模块的 URL 拦截清单(经核验模块源码), 用官方 url_regex
  #   规则(Rules 文档支持)REJECT 以下精确路径. 这些只读 URL、不解密
  #   body, 能效极小:
  #   • googlevideo.com/...&oad : 独立投放的广告视频流(前贴/中插主力)
  #   • youtubei/.../player/ad_break : 广告插入点请求
  #   • (www|s).youtube.com/api/stats/ads : 广告播放统计
  #   • (www|s).youtube.com/pagead|ptracking : 广告投放/追踪
  #   • s.youtube.com/api/stats/qoe?...adcontext : 广告质量上报
  # 注: videoplayback? 正常视频流被排除(不在 &oad 模式内), 不受影响.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - url_regex:
      match: '^https?://[\w-]+\.googlevideo\.com/.+(&oad|[?&]oad=)'
      policy: REJECT
      name: YT 广告视频流
  - url_regex:
      match: '^https?://youtubei\.googleapis\.com/youtubei/v\d+/player/ad_break'
      policy: REJECT
      name: YT 广告插入点
  - url_regex:
      match: '^https?://(www|s)\.youtube\.com/api/stats/ads'
      policy: REJECT
      name: YT 广告统计
  - url_regex:
      match: '^https?://(www|s)\.youtube\.com/(pagead|ptracking)'
      policy: REJECT
      name: YT 广告投放追踪
  - url_regex:
      match: '^https?://s\.youtube\.com/api/stats/qoe\?.*adcontext'
      policy: REJECT
      name: YT 广告质量上报

  # ── 1. 微博/新浪保护区 → 直连(必须先于广告规则集) ──
  - domain_suffix:
      match: weibo.cn
      policy: DIRECT
  - domain_suffix:
      match: weibo.com
      policy: DIRECT
  - domain_suffix:
      match: weibo.com.cn
      policy: DIRECT
  - domain_suffix:
      match: weibocdn.com
      policy: DIRECT
  - domain_suffix:
      match: sinaimg.cn
      policy: DIRECT
  - domain_suffix:
      match: sina.cn
      policy: DIRECT
  - domain_suffix:
      match: sina.com.cn
      policy: DIRECT
  - domain_suffix:
      match: sinajs.cn
      policy: DIRECT
  - domain_suffix:
      match: miaopai.com
      policy: DIRECT

  # ── 2. REJECT 风暴熔断(高频重试源 → REJECT-DROP 丢包, 让 App 等超时放弃) ──
  - domain:
      match: umc.danuoyi.alicdn.com
      policy: REJECT-DROP
  - domain_suffix:
      match: mum.alibabachengdun.com
      policy: REJECT-DROP
  # [H1] siftscience.com 已移除: Sift 是反欺诈/风控服务(非广告), DROP 会
  #   导致用其风控的电商/支付/约会 App 登录或下单失败. 误列, 不再拦截.
  - domain_keyword:
      match: pangolin-sdk-toutiao
      policy: REJECT-DROP
  - domain_suffix:
      match: ctobsnssdk.com
      policy: REJECT-DROP
  - domain_suffix:
      match: px.ucweb.com
      policy: REJECT-DROP
  # [H3] umeng: 由 keyword 收紧为精确后缀, 避免命中耦合推送/登录的友盟
  #   子域拖慢启动. 友盟主域为 umeng.com / umeng.co.
  - domain_suffix:
      match: umeng.com
      policy: REJECT-DROP
  - domain_suffix:
      match: umeng.co
      policy: REJECT-DROP
  # [H3] adsdk: 由 keyword('adsdk' 会误命中 broadsdk/loadsdk 等无关域)收紧
  #   为已知广告 SDK 后缀. 如需更多可继续追加, 但不再用宽泛 keyword.
  - domain_suffix:
      match: adsdk.com
      policy: REJECT-DROP
  - domain_suffix:
      match: xz.fbcdn.net
      policy: REJECT-DROP
  - domain_suffix:
      match: xy.fbcdn.net
      policy: REJECT-DROP
  - domain_suffix:
      match: e.qq.com
      policy: REJECT-DROP
  # v6.5.1 [可用性] 移除 egernlicense.com 的 REJECT-DROP.
  #   该域是 Egern 自身的授权/License 服务器, 静默丢包它有触发授权异常/
  #   掉授权的风险, 而拦截它的收益不明确. 不属于"高频重试广告源", 不应留
  #   在熔断段. 如确认它纯为遥测且不影响授权, 可再单独加回.

  # ── 3. 广告/隐私拦截 → REJECT ──
  #   不引入 Privacy.list(含微博埋点会破坏微博); 不拦 gdt.qq.com(微博走
  #   广点通, REJECT 会触发重试风暴).

  # B 站广告物料 CDN(cm=commercial, 纯广告域)
  - domain:
      match: cm.bilibili.com
      policy: REJECT
  - domain:
      match: cm.biliapi.net
      policy: REJECT

  # 微博广告物料
  - domain_suffix:
      match: biz.weibo.com
      policy: REJECT
  - domain:
      match: bootpreload.uve.weibo.com
      policy: REJECT
  - domain_suffix:
      match: fastimage.uve.weibo.com
      policy: REJECT
  - domain_suffix:
      match: adimg.vue.weibo.com
      policy: REJECT
  - domain_suffix:
      match: sdkapp.uve.weibo.com
      policy: REJECT
  - domain_suffix:
      match: weibomingzi.com
      policy: REJECT

  # 通用广告 / 运营商劫持规则集
  - rule_set:
      name: Advertising
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Advertising/Advertising.list
      policy: REJECT
      update_interval: 86400
  - rule_set:
      name: Hijacking
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Hijacking/Hijacking.list
      policy: REJECT
      update_interval: 86400

  # 全球追踪 / 分析 SDK
  - domain_suffix:
      match: adjust.com
      policy: REJECT
  - domain_suffix:
      match: appsflyer.com
      policy: REJECT
  - domain_suffix:
      match: branch.io
      policy: REJECT
  - domain_suffix:
      match: kochava.com
      policy: REJECT
  - domain_suffix:
      match: mixpanel.com
      policy: REJECT
  - domain_suffix:
      match: amplitude.com
      policy: REJECT
  - domain_suffix:
      match: segment.com
      policy: REJECT
  - domain_suffix:
      match: segment.io
      policy: REJECT
  - domain_suffix:
      match: fullstory.com
      policy: REJECT
  - domain_suffix:
      match: hotjar.com
      policy: REJECT
  - domain_suffix:
      match: demdex.net
      policy: REJECT
  - domain_suffix:
      match: scorecardresearch.com
      policy: REJECT

  # DSP/SSP 广告交易
  - domain_suffix:
      match: googlesyndication.com
      policy: REJECT
  - domain_suffix:
      match: doubleclick.net
      policy: REJECT
  - domain_suffix:
      match: google-analytics.com
      policy: REJECT
  - domain_suffix:
      match: googletagmanager.com
      policy: REJECT
  - domain_suffix:
      match: googletagservices.com
      policy: REJECT
  - domain_suffix:
      match: googleadservices.com
      policy: REJECT
  - domain_suffix:
      match: criteo.com
      policy: REJECT
  - domain_suffix:
      match: criteo.net
      policy: REJECT

  # 移动 App 广告 SDK
  - domain_suffix:
      match: applovin.com
      policy: REJECT
  - domain_suffix:
      match: chartboost.com
      policy: REJECT
  - domain_suffix:
      match: ironsrc.com
      policy: REJECT
  - domain_suffix:
      match: admob.com
      policy: REJECT
  - domain_suffix:
      match: mopub.com
      policy: REJECT
  - domain_suffix:
      match: vungle.com
      policy: REJECT
  - domain_suffix:
      match: inmobi.com
      policy: REJECT
  - domain_suffix:
      match: adcolony.com
      policy: REJECT
  - domain_suffix:
      match: flurry.com
      policy: REJECT

  # 国内广告联盟(不含 gdt.qq.com)
  - domain_suffix:
      match: pos.baidu.com
      policy: REJECT
  - domain_suffix:
      match: hm.baidu.com
      policy: REJECT
  - domain_suffix:
      match: cpro.baidu.com
      policy: REJECT
  - domain_suffix:
      match: tanx.com
      policy: REJECT
  - domain_suffix:
      match: mmstat.com
      policy: REJECT

  # 腾讯音乐 / QQ 音乐广告
