# =====================================================================
# Egern Pro Master Configuration — v6.5.0  (TUN Mode + NextDNS)
# Generated: 2026-05-27
# ---------------------------------------------------------------------
# ┌─ v6.5.0 改动 (TUN 模式 + 境外用 NextDNS, 解决 DNS 隐私) ─────────┐
# │ 背景: 此前 v6.2-6.4 为修"境外服务全挂", 把境外域名解析退到国内    │
# │   DoH(阿里/腾讯), 代价是国内DNS商能看到你的境外查询。参考成熟配置 │
# │   iBL3ND(TUN模式)发现: 境外DNS不是"Egern先天不可用", 而是"非TUN   │
# │   模式下不可用"——非TUN时DoH连接直连、国内连不上境外DNS。          │
# │                                                                    │
# │ [T1] vif_only: true — 开启 TUN 模式。这是境外DNS可用的【前提】:   │
# │   TUN下Egern接管整个网络栈, 境外DoH连接被路由捕获、走代理出去。    │
# │ [T2] compat_route: true — TUN 模式标准搭配, 改善兼容性。           │
# │ [T3] Foreign-DoH 改用 NextDNS(dns.nextdns.io/f3af17)+ Cloudflare/ │
# │   Google 备用。境外域名解析经代理到达境外DNS → 国内DNS商和运营商   │
# │   都【看不到】你的境外查询。隐私问题解决。                         │
# │ [T4] hosts 硬编码境外DoH服务器IP(防其域名被污染解析)。            │
# │                                                                    │
# │ 代价(诚实标注):                                                  │
# │   • DNS解析稳定性现在【绑定节点稳定性】: 节点抖→DNS解析抖。境外    │
# │     服务再失败时, 先查节点而非DNS配置。                            │
# │   • TUN模式接管全部流量, 后台耗电略高于非TUN。                     │
# │                                                                    │
# │ 未照搬 iBL3ND 的代价项(实事求是):                                │
# │   • 不开全局 block_quic:true(保留HTTP/3, YouTube去广告靠精准QUIC   │
# │     reject而非全局禁, 见rules 0.6)。                              │
# │   • 不开 allow_external_connections:true(那是额外攻击面)。        │
# │   • 不引入其海量第三方个人域规则集(信任度/稳定性参差)。           │
# └────────────────────────────────────────────────────────────────┘
#
# ── v6.4.0 改动 (吸收成熟配置 Repcz/Tool 的优点) ──
# │ 对比对象: Repcz/Tool (956★, 社区主流参考) 的 Egern 配置与 DNS 模块.│
# │                                                                    │
# │ [S1] rules 瘦身 — 国内大厂硬编码清单外包给 ChinaMax 规则集.        │
# │   删除约 100 条冗余 domain_suffix(阿里/腾讯/百度/京东/美团/网易/   │
# │   视频/出行/工具/运营商等), 这些 ChinaMax 必收录且无顺序依赖.      │
# │   动机(Repcz 启发): 把'高频变动的域名清单'交给版本化规则集自动     │
# │   更新, 配置只维护'分流逻辑', 根治'清单滞后导致国内App漏分流'.     │
# │   rules 从 331 条降至约 240 条.                                    │
# │   ★ 保留未删(有理由): ① 微博/新浪系(须在广告规则集前 DIRECT)      │
# │     ② 抖音/字节系(须在 TikTok 规则集前 DIRECT) ③ 金融系(券商/银行 │
# │     风控不容赌, 显式 DIRECT 最稳) ④ Apple CDN(独立逻辑).          │
# │   最坏情况(规则集偶漏): 落 GEOIP CN 兜底仍 DIRECT(国内IP), 安全.   │
# │                                                                    │
# │ [S2] 新增路由器/NAS 管理后台域名 → system DNS + DIRECT (Repcz 启发)│
# │   miwifi/tplogin/tplinkwifi/router.asus/tendawifi/melogin/falogin/ │
# │   synology/unifi 等. 这些是局域网设备管理页, 必须系统 DNS 解析才能 │
# │   拿到内网 IP; 原配置缺失, 可能导致路由器后台打不开. DNS 层 0.1 +  │
# │   rules 层 0.2 配套.                                               │
# │                                                                    │
# │ 未吸收(实事求是评估后认为投入产出比低/不适用):                    │
# │   • 厂商级 DNS 精细分派(Repcz DNS模块575行: 阿里→alidns/腾讯→     │
# │     doh.pub/百度→180.76...): 发烧友级, 维护成本极高, 收益感知不明显.│
# │   • FCM 推送域名硬编码 IP: iOS 用不上(那是安卓推送机制).           │
# └────────────────────────────────────────────────────────────────┘
#
# ── v6.3.0 改动 (修复 YouTube 去广告失效) ──
# │ 现象: 浮窗播放可用, 但 YouTube 广告去不掉.                         │
# │ 根因(经核验 Maasea YouTube.Enhance 模块最新源码): 去广告依赖对    │
# │   *.googlevideo.com 的广告流(initplayback&oad)做拦截, 但 v6.2.0   │
# │   ① 只 reject 了 youtubei 的 QUIC, 漏了 googlevideo 的 QUIC;       │
# │   ② MITM 把 *.googlevideo.com 整个 exclude → 拦截规则完全失效.     │
# │   浮窗靠 youtubei 响应改写(已解密)→ 成功; 去广告靠 googlevideo     │
# │   拦截(被排除/还走QUIC)→ 失败. 现象与根因完全自洽.                 │
# │ 修复(对齐模块要求):                                               │
# │   [Y1] rules 0.6: QUIC-reject 从"仅 youtubei"扩到"googlevideo +    │
# │        youtubei"(模块要求二者均走 TCP).                           │
# │   [Y2] MITM: *.googlevideo.com 从 excludes 移除、移入 includes     │
# │        (仅 URL 层处理, 不解密视频 body).                          │
# │   [Y3] MITM includes 增 www/s.youtube.com (广告统计信标域).        │
# │   [Y4] rules 0.7: 新增 5 条 url_regex REJECT(广告流 &oad / 广告    │
# │        插入点 / 广告统计 / pagead-ptracking / qoe-adcontext).      │
# │ 能效: 小幅增加 — googlevideo 视频流连接多一次 QUIC→TCP 握手解密,   │
# │   【不解密视频 body】(几百 MB 视频本体不碰). 用户已确认接受.       │
# │ 效果边界(务实诚实): 拦掉独立广告流(&oad)+界面广告位, 对移动端     │
# │   前贴广告通常有效; 但拼进 videoplayback 流的 SSAI 服务端拼接广告  │
# │   仍拦不掉(需解 body, 全球 MITM 方案皆无解, 非本配置缺陷).         │
# └────────────────────────────────────────────────────────────────┘
#
# ── v6.2.0 关键修复 (修复境外服务全部打不开) ──
# │ [CRITICAL] 重定义 Foreign-DoH 上游组. v6.1.0 及之前用境外 DoH      │
# │   (9.9.9.9/8.8.8.8 等)解析境外域名, 但 Egern 的 Upstreams DoH 连接 │
# │   由 system 解析【且直连不走代理】(官方文档明确). 国内 5G 下到这些 │
# │   境外 IP 的 443 被阻断 → DoH 查询发不出 → Instagram/X/GitHub/     │
# │   googleapis 全部 "DNS Resolution Failed"、Zero KB. 这是 FB/X 等   │
# │   境外服务全部打不开的真因(由用户 Connections 截图确诊).           │
# │   修复: Foreign-DoH 改用国内可达 DoH(阿里/腾讯). 境外域名解析不再  │
# │   卡住, 流量随后被 rules 路由到代理, 由节点远端解析真实 IP. 详见    │
# │   upstreams 段的完整原理与权衡说明.                                │
# │                                                                    │
# │   反思: 这是我(助手)重构 DNS 时的真实设计缺陷 — 把境外域名指向了   │
# │   "国内直连不通的境外 DoH", 却未验证这些 DoH 自身可达. 已修正.     │
# └────────────────────────────────────────────────────────────────┘
#
# ── v6.1.0 改动 (压力测试修复) ──
# │ [H1] 移除 siftscience.com 的 REJECT-DROP. Sift 是反欺诈/风控服务  │
# │      (非广告), 误列会导致用其风控的电商/支付/约会 App 登录或下单  │
# │      失败. 这是上一版唯一的功能性高危误伤.                         │
# │ [H2] 新增硬编码 domain: youtubei.googleapis.com -> YouTube. 原先   │
# │      该域的 TCP 路由完全依赖远程 YouTube.list 收录; 一旦规则集改版 │
# │      删除该条目, YouTube 去广告会'静默失效'(无报错, 广告悄悄回来). │
# │      硬编码后此链自包含, 不再依赖外部规则集结构.                   │
# │ [H3] 收紧两个过宽的 domain_keyword: 'adsdk'(可能误伤 broadsdk 等   │
# │      无关域)改为精确广告 SDK 后缀; 'umeng' keyword 改为 umeng.com  │
# │      /umeng.co 后缀, 避免命中耦合了推送/登录的友盟子域拖慢启动.    │
# │ [D1] 删除 DNS forward 中 '*.com.cn' 死规则: 它被前一条 '*.cn'      │
# │      完全覆盖(*.cn 已匹配所有 .cn 结尾含 .com.cn), 永不触发.       │
# │ [D2] 流媒体(YouTube/Netflix/Spotify/TikTok)显式钉 Foreign-DoH:     │
# │      原先走兜底 '*' 同效, 但显式声明更明确、不依赖兜底位置, 也便于 │
# │      日后审计解析×路由一致性.                                      │
# └────────────────────────────────────────────────────────────────┘
#
# DNS 逻辑结论(经解析×路由一致性矩阵审查): 整体健康, 无危险错配
#   (无"国内DoH给国内IP却走代理出境"或"境外DoH给境外IP却直连"的组合).
#   唯一边缘情况: 若用户手动把 Apple 策略组切到境外节点, Apple 域仍走
#   国内DoH(国内IP)会绕路 — 但 Apple 默认 DIRECT, 属非常规操作, 可接受.
#
# ── v6.0.0 基线改动 (经官方文档核验) ──
#   [修复 1] 微信 VOIP 保护: 用官方 `and` 逻辑规则(protocol=udp AND
#            原"裸 geoip CN no_resolve". 旧写法对所有 CN IP 一刀切, 会
#            误伤"自行解析后用 IP 直连"的境外服务(其 CDN/anycast 边缘
#            偶被 GeoIP 判成 CN). 限定 udp 后, 网页/App 的 TCP 境外流量
#            不再被误直连; 仅 VOIP 这类"国内 IP 的 UDP 媒体流"前置直连.
#            注: 未用"腾讯 ASN"方案 — 经查腾讯 AS132203/AS45090 国内外
#            网段混编且含 anycast, 按 ASN 锁定要么漏 VOIP 要么误伤境外
#            腾讯节点, 不如 udp+CN 精确稳健.
#   [修复 2] gstatic: 旧配置把整个 *.gstatic.com → bootstrap(系统 DNS),
#            会让需走代理的 Google 静态资源被国内 DNS 污染. 现仅把测速
#            精确域名 connectivitycheck.gstatic.com → bootstrap.
#   [修复 3] aaplimg.com: 旧配置强制其走国内 DoH + DIRECT, 但该域国内外
#            均有边缘节点. 现从"国内 DoH 强制"中移除, 让其走兜底, 由
#            就近解析决定; rules 层仍保留 Apple 策略组(优先直连).
#   [修复 4] YouTube.Enhance: 旧注释写"与 block_quic:true 协同", 与实际
#            block_quic:false 矛盾, 且"QUIC 自动 fallback"无官方文档支撑.
#            本版改为确定性方案: 加一条规则 REJECT youtubei.googleapis.com
#            的 QUIC, 强制其 fallback TCP, 确保被 MITM 稳定解密(见 rules 0.6).
#            既不牺牲全局 HTTP/3, 又不依赖未文档化的行为.
#   [修复 5] MITM 口令: 仍提示用户务必自改(见 mitm 段). 配置文件无法替
#            用户生成 p12, 但已在最显眼处再次强调.
#
# 守约: 不削减旧配置任何已生效功能; 去广告模块按用户要求"全部保留"
#   (功耗换全面). 三层 DNS / 防抖策略组 / MITM 排除纪律 全部保留.
#
# ⚠️ 安全提醒(最高优先): MITM CA 口令仍为默认 'egern'. 请立刻在 Egern
#    App 内重新生成 egern.p12 并改 ca_passphrase, 否则任何拿到该 p12 的
#    人都能解密你 MITM 的全部站点流量.
# =====================================================================


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 全局基础参数
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# IPv6 关闭: 双栈下 DoH 解析 A/AAAA 各一次, 查询量翻倍; 家庭 IPv6 名义
#   可用但质量差, 关闭消除一类不确定性.
ipv6: false

http_port: 3080
socks_port: 3090

# allow_external_connections: 保持 false. iBL3ND 配置开了 true(把本机当
#   局域网代理服务器), 但那是额外攻击面, 非必要不开. 我们保守关闭.
allow_external_connections: false

# ★ vif_only: true — TUN 模式 (v6.5.0 关键改动)
#   这是"境外域名用真境外 DNS"方案成立的【前提】。非 TUN 模式下, DNS
#   上游(DoH)连接是直连的(官方文档), 境外 DoH(如 NextDNS)在国内连不上
#   → 这正是 v6.1.0 境外服务全挂的根因。TUN 模式下 Egern 接管整个网络栈,
#   境外 DoH 连接也会被路由逻辑捕获、走代理出去 → 境外 DNS 可用, 且国内
#   DNS 商看不到你的境外查询(解决了 v6.2-v6.4 "全走阿里腾讯"的隐私问题)。
vif_only: true

# QUIC: 全局 false(保留 HTTP/3 优势: YouTube 4K / Google / Cloudflare).
#   官方优先级: proxy > policy group > global; 默认 TCP 协议 block、UDP
#   协议 allow. 需强制某 host 走 TCP 以保 MITM 解密时, 不动全局, 而是用
#   "REJECT 该 host 的 QUIC"规则触发客户端 fallback(见 rules 0.6 的 YouTube).
block_quic: false

hide_vpn_icon: false

# GeoIP / ASN 数据库
geoip_db_url: https://github.com/xream/geoip/releases/latest/download/ipinfo.country.mmdb
asn_db_url: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb

# 测速 URL (配合 DNS forward 层 0 的 bootstrap 直解, 避免 2.19.0 后的
#   "测速域名走 Foreign-DoH → 本地被 RST → 死锁 → 全节点 timeout").
proxy_latency_test_url: http://cp.cloudflare.com/generate_204
direct_latency_test_url: http://www.baidu.com

# compat_route: true — TUN 模式下开启兼容路由, 改善与部分 App/网络栈的
#   兼容性(iBL3ND 等 TUN 配置的标准搭配). 非 TUN 时无意义, TUN 下建议开.
compat_route: true

# 网络捕获范围: 三者全关(回归 Egern 默认). 开 include_apns 会让微信 VOIP
#   的 PushKit/APNs 信令进入代理流水线, 已知导致来电转圈接不通.
include_all_networks: false
include_apns: false
include_cellular_services: false


# =====================================================================
# DNS — 三层分流架构
# ---------------------------------------------------------------------
# 原则: 国内域名→国内 DoH(就近 CDN); AI/海外→境外 DoH(抗污染); 兜底境外.
# forward 自上而下匹配, 顺序即优先级.
# =====================================================================
dns:
  # Bootstrap: 解析 upstreams 里 DoH/DoT/DoQ 服务器自身域名(鸡生蛋, 必须
  #   用普通 DNS). system 之外补纯 IP, 防 Egern 启动/网络切换瞬间 system
  #   bootstrap 短暂不可用导致的批量解析失败. 纯 IP 无需再解析自身, 无死锁.
  bootstrap:
    - system
    - 223.5.5.5
    - 119.29.29.29

  upstreams:
    # 国内 DoH: 全纯 IP(无前置解析依赖). 阿里 + 腾讯 DNSPod 双供应商容错.
    Domestic-DoH:
      - https://223.5.5.5/dns-query
      - https://223.6.6.6/dns-query
      - https://1.12.12.12/dns-query
      - https://120.53.53.53/dns-query
      - quic://223.5.5.5:853
      - quic://223.6.6.6:853

    # ★★★ 境外域名解析组 (v6.5.0: TUN 模式下用真境外 DNS) ★★★
    #
    # 演进史:
    #   v6.1.0: 用境外 DoH(8.8.8.8等), 但非TUN模式下DoH直连→国内连不上→
    #           境外服务全挂(DNS Resolution Failed)。
    #   v6.2-6.4: 退而求其次, 改用国内DoH(阿里/腾讯), 境外服务恢复, 但代价
    #           是国内DNS商能看到你的境外域名查询(隐私暴露)。
    #   v6.5.0: 开启 TUN 模式(vif_only:true)后, DoH连接会被Egern路由捕获、
    #           走代理出去 → 境外DNS【可用】, 且查询经代理到达, 国内DNS商
    #           【看不到】你查境外站。这是隐私与可用性的两全, 但依赖TUN。
    #
    # 主用户指定: NextDNS(https://dns.nextdns.io/f3af17, 带配置ID f3af17,
    #   NextDNS会应用该profile的过滤/日志策略)。备用 Cloudflare/Google,
    #   防 NextDNS 偶发不可达。
    #
    # 工作机制(诚实标注): 这些DoH查询本身走你的代理节点出去。
    #   • 隐私: 查询经加密+经代理, 国内DNS商和运营商都看不到 ✓
    #   • 依赖: DNS解析的稳定性现在【绑定代理节点稳定性】。节点抖动时,
    #     DNS解析会跟着抖(这是TUN+境外DNS方案的固有代价, 非缺陷)。
    #   • 若境外服务又出现解析失败, 优先排查节点是否可用, 而非DNS配置。
    Foreign-DoH:
      - https://dns.nextdns.io/f3af17
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query

  forward:
    # ── 层 0.05: .local (mDNS/Bonjour) → system (v6.5.1) ──
    #   配合 hosts 段删除 '*.local': 192.168.1.1. 局域网设备(AirPlay/
    #   Chromecast/打印机/NAS).local 名称必须交系统 mDNS 解析, 不能落到
    #   兜底 '*' → Foreign-DoH(那会解析失败/绕路).
    - domain_suffix:
        match: local
        value: system

    # ── 层 0: 测速/连通性检查域名 → bootstrap(系统 DNS 直解, 切断死锁) ──
    #   仅精确域名, 不用后缀, 避免误伤需走代理的同域资源.
    - domain:
        match: cp.cloudflare.com
        value: bootstrap
    - domain:
        match: connectivitycheck.gstatic.com
        value: bootstrap
    - domain:
        match: www.gstatic.com
        value: bootstrap

    # ── 层 0.08: 机场节点域名 → bootstrap (v6.5.1, 需用户手动填) ──
    #   ⚠️ TUN(vif_only)+ 境外DoH经代理 的固有风险: 若机场节点用【域名】
    #   寻址(非 IP 字面量), 该域名会落到兜底 '*' → Foreign-DoH, 而境外 DoH
    #   又要先有代理 → 启动期解析循环依赖 / 死锁. 节点域名必须用 bootstrap
    #   (system + 国内纯IP) 直解, 不依赖代理.
    #
    #   操作: 把你机场订阅里【节点服务器域名的根域】填到下面并取消注释.
    #   例(占位, 改成你自己的): 若节点形如 hk01.example-airport.com, 则:
    #     - domain_suffix:
    #         match: example-airport.com
    #         value: bootstrap
    #
    #   若你的机场节点本就是 IP 字面量(无域名), 则无需此段, 不受影响.

    # ── 层 0.1: 路由器/NAS 管理后台域名 → system (v6.4.0 吸收 Repcz) ──
    #   这些是局域网内设备的管理页, 必须用系统 DNS 解析才能拿到内网 IP;
    #   若走 DoH 会解析失败或拿到错误结果, 导致打不开路由器后台.
    - domain_suffix:
        match: miwifi.com
        value: system
    - domain:
        match: www.miwifi.com
        value: system
    - domain_suffix:
        match: tplogin.cn
        value: system
    - domain_suffix:
        match: tplinkwifi.net
        value: system
    - domain_suffix:
        match: tplinklogin.net
        value: system
    - domain:
        match: router.asus.com
        value: system
    - domain_suffix:
        match: routerlogin.net
        value: system
    - domain_suffix:
        match: orbilogin.com
        value: system
    - domain:
        match: mediarouter.home
        value: system
    - domain_suffix:
        match: tendawifi.com
        value: system
    - domain_suffix:
        match: melogin.cn
        value: system
    - domain_suffix:
        match: falogin.cn
        value: system
    - domain:
        match: zte.home
        value: system
    - domain_suffix:
        match: hiwifi.com
        value: system
    - domain:
        match: amplifi.lan
        value: system
    - domain:
        match: unifi.local
        value: system
    - domain:
        match: router.synology.com
        value: system

    # ── 层 0.4: 小红书全域 → 国内 DoH(钉死, 不依赖规则集是否收录) ──
    - domain_suffix:
        match: xiaohongshu.com
        value: Domestic-DoH
    - domain_suffix:
        match: xhscdn.com
        value: Domestic-DoH
    - domain_suffix:
        match: xhslink.com
        value: Domestic-DoH
    - domain_suffix:
        match: fegine.com
        value: Domestic-DoH

    # ── 层 0.5a: 抖音/字节系国内 → 国内 DoH(与 TikTok 海外在 DNS 层分离) ──
    - domain_suffix:
        match: douyin.com
        value: Domestic-DoH
    - domain_suffix:
        match: douyincdn.com
        value: Domestic-DoH
    - domain_suffix:
        match: douyinpic.com
        value: Domestic-DoH
    - domain_suffix:
        match: douyinstatic.com
        value: Domestic-DoH
    - domain_suffix:
        match: douyinvod.com
        value: Domestic-DoH
    - domain_suffix:
        match: iesdouyin.com
        value: Domestic-DoH
    - domain_suffix:
        match: amemv.com
        value: Domestic-DoH
    - domain_suffix:
        match: snssdk.com
        value: Domestic-DoH

    # ── 层 0.5d: 国内非 .cn 大厂"离线白名单" → 国内 DoH ──
    #   病根: 兜底 '*'→Foreign-DoH 隐含"漏到兜底=境外"的错误假设, 但大量
    #   国内大厂用 .com/.net 且未必被规则集收录 → 漏到兜底被境外 DoH 解析
    #   → 国内 5G 下被 RST → 打不开. 此段不依赖远程规则集, 断网亦生效.
    # —— 出行/地图/票务 ——
    - domain_suffix:
        match: umetrip.com
        value: Domestic-DoH
    - domain_suffix:
        match: amap.com
        value: Domestic-DoH
    - domain_suffix:
        match: autonavi.com
        value: Domestic-DoH
    - domain_suffix:
        match: ctrip.com
        value: Domestic-DoH
    - domain_suffix:
        match: tripcdn.com
        value: Domestic-DoH
    - domain_suffix:
        match: qunar.com
        value: Domestic-DoH
    - domain_suffix:
        match: didiglobal.com
        value: Domestic-DoH
    - domain_suffix:
        match: xiaojukeji.com
        value: Domestic-DoH
    - domain_suffix:
        match: sf-express.com
        value: Domestic-DoH
    # —— 电商/本地生活 ——
    - domain_suffix:
        match: jd.com
        value: Domestic-DoH
    - domain_suffix:
        match: 360buyimg.com
        value: Domestic-DoH
    - domain_suffix:
        match: pinduoduo.com
        value: Domestic-DoH
    - domain_suffix:
        match: yangkeduo.com
        value: Domestic-DoH
    - domain_suffix:
        match: meituan.com
        value: Domestic-DoH
    - domain_suffix:
        match: meituan.net
        value: Domestic-DoH
    - domain_suffix:
        match: dianping.com
        value: Domestic-DoH
    - domain_suffix:
        match: dewu.com
        value: Domestic-DoH
    # —— 内容/视频/音乐 ——
    - domain_suffix:
        match: 163.com
        value: Domestic-DoH
    - domain_suffix:
        match: 126.net
        value: Domestic-DoH
    - domain_suffix:
        match: iqiyi.com
        value: Domestic-DoH
    - domain_suffix:
        match: youku.com
        value: Domestic-DoH
    - domain_suffix:
        match: mgtv.com
        value: Domestic-DoH
    - domain_suffix:
        match: hunantv.com
        value: Domestic-DoH
    - domain_suffix:
        match: kuaishou.com
        value: Domestic-DoH
    - domain_suffix:
        match: gifshow.com
        value: Domestic-DoH
    - domain_suffix:
        match: douyu.com
        value: Domestic-DoH
    - domain_suffix:
        match: huya.com
        value: Domestic-DoH
    - domain_suffix:
        match: ximalaya.com
        value: Domestic-DoH
    - domain_suffix:
        match: kugou.com
        value: Domestic-DoH
    - domain_suffix:
        match: douban.com
        value: Domestic-DoH
    # —— 工具/办公/云盘 ——
    - domain_suffix:
        match: wpscdn.com
        value: Domestic-DoH
    - domain_suffix:
        match: aliyundrive.com
        value: Domestic-DoH
    - domain_suffix:
        match: alipan.com
        value: Domestic-DoH
    - domain_suffix:
        match: smzdm.com
        value: Domestic-DoH

    # ── 层 0.5b: AI/海外服务 → 境外 DoH(前置, 防误命中国内规则集) ──
    # -- OpenAI / ChatGPT --
    - domain_suffix:
        match: openai.com
        value: Foreign-DoH
    - domain_suffix:
        match: chatgpt.com
        value: Foreign-DoH
    - domain_suffix:
        match: oaistatic.com
        value: Foreign-DoH
    - domain_suffix:
        match: oaiusercontent.com
        value: Foreign-DoH
    # -- Anthropic / Claude --
    - domain_suffix:
        match: anthropic.com
        value: Foreign-DoH
    - domain_suffix:
        match: claude.ai
        value: Foreign-DoH
    # -- Google Gemini / AI Studio --
    - domain_suffix:
        match: gemini.google.com
        value: Foreign-DoH
    - domain_suffix:
        match: aistudio.google.com
        value: Foreign-DoH
    - domain_suffix:
        match: generativelanguage.googleapis.com
        value: Foreign-DoH
    # -- 其他 AI --
    - domain_suffix:
        match: perplexity.ai
        value: Foreign-DoH
    - domain_suffix:
        match: x.ai
        value: Foreign-DoH
    - domain_suffix:
        match: grok.com
        value: Foreign-DoH
    - domain_suffix:
        match: mistral.ai
        value: Foreign-DoH
    - domain_suffix:
        match: huggingface.co
        value: Foreign-DoH
    # -- 漏网境外站 --
    - domain_suffix:
        match: quora.com
        value: Foreign-DoH
    - domain_suffix:
        match: tumblr.com
        value: Foreign-DoH
    - domain_suffix:
        match: pinterest.com
        value: Foreign-DoH
    - domain_suffix:
        match: pinimg.com
        value: Foreign-DoH

    # ── 层 0.5e: 流媒体显式钉 Foreign-DoH [D2] ──
    #   原先走兜底 '*' 同效, 但显式声明更明确、不依赖兜底位置, 便于审计
    #   解析×路由一致性(这些域路由层均走代理, DNS 同侧给境外 IP).
    - domain_suffix:
        match: youtube.com
        value: Foreign-DoH
    - domain_suffix:
        match: googlevideo.com
        value: Foreign-DoH
    - domain_suffix:
        match: ytimg.com
        value: Foreign-DoH
    - domain_suffix:
        match: netflix.com
        value: Foreign-DoH
    - domain_suffix:
        match: nflxvideo.net
        value: Foreign-DoH
    - domain_suffix:
        match: nflximg.net
        value: Foreign-DoH
    - domain_suffix:
        match: spotify.com
        value: Foreign-DoH
    - domain_suffix:
        match: scdn.co
        value: Foreign-DoH
    - domain_suffix:
        match: tiktokv.com
        value: Foreign-DoH
    - domain_suffix:
        match: tiktokcdn.com
        value: Foreign-DoH

    # ── 层 0.5c: Apple 服务域 → 国内 DoH(修 ls/push 解析失败) ──
    #   Apple 在华本地节点(世纪互联/Akamai)用国内 DoH 可拿有效就近 IP.
    #   注: 已移除 aaplimg.com — 该泛域国内外均有边缘, 强制国内 DoH 反
    #   而可能对境外请求拿到次优 IP; 让它走兜底由就近解析决定更稳.
    - domain_suffix:
        match: ls.apple.com
        value: Domestic-DoH
    - domain_suffix:
        match: push.apple.com
        value: Domestic-DoH
    - domain_suffix:
        match: apple.com
        value: Domestic-DoH
    - domain_suffix:
        match: cdn-apple.com
        value: Domestic-DoH

    # ── 层 1a: 国内顶级域 → 国内 DoH ──
    #   注: '*.cn' 已覆盖所有 .cn 结尾(含 .com.cn/.net.cn/.gov.cn 等), 故
    #   不再单列 '*.com.cn'(原为死规则, 永不触发). [D1]
    - domain_wildcard:
        match: '*.cn'
        value: Domestic-DoH

    # ── 层 1b: 国内 .com 域名(ChinaMax 规则集, 含 CDN/私有域) → 国内 DoH ──
    #   说明: ChinaMax 基本是 ChinaDomain 的超集, 故只挂 ChinaMax 一份,
    #   省一次规则集拉取与匹配(旧配置同挂两份, 冗余).
    - proxy_rule_set:
        match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax.list
        value: Domestic-DoH
        update_interval: 86400

    # ── 层 2: 兜底 → 境外 DoH ──
    - domain_wildcard:
        match: '*'
        value: Foreign-DoH

  # ── Hosts: 静态映射 ──
  hosts:
    # Apple 国内 CDN(金山云加速)
    iosapps.itunes.apple.com: iosapps.itunes.apple.com.download.ks-cdn.com
    localhost: 127.0.0.1
    # v6.5.1 [可用性] 删除 '*.local': 192.168.1.1
    #   原写法把所有 *.local (mDNS/Bonjour) 硬映射到单一网关 IP, 会破坏
    #   AirPlay / Chromecast / 打印机 / NAS 的 .local 设备发现 (它们并不
    #   都在 192.168.1.1). .local 应交给系统 mDNS 解析 — 见 DNS forward
    #   层 0.05 新增的 'local → system' 钉死.
    # 境外 DoH 服务器域名 → 硬编码官方 IP (v6.5.0)
    #   作用: 备用境外 DoH 是域名形式(dns.google/cloudflare-dns.com),
    #   若靠 bootstrap(国内DNS)解析它们的域名, 可能被污染成错误IP →
    #   连不上备用DNS。硬编码官方IP, 让这些DoH服务器域名直接拿到正确IP,
    #   TUN模式下再经代理连接。NextDNS(dns.nextdns.io)用anycast, 同理钉IP。
    cloudflare-dns.com:
      - 104.16.248.249
      - 104.16.249.249
    dns.google:
      - 8.8.8.8
      - 8.8.4.4
    dns.nextdns.io:
      - 45.90.28.0
      - 45.90.30.0

  # EDNS Client Subnet 用(拿更精准 CDN IP)
  public_ip_lookup_url: https://ifconfig.me/ip

  # proxy_nameservers: 2.19.0 后 proxy DNS 共享默认 resolver 的 forward
  #   规则, 此项仅作 fallback. 显式给国内 DoH, 测速阶段(代理未建立)即可
  #   秒解析, 消除"回退境外 DoH 被 RST"的死锁. 同源阿里/腾讯, 信任面不变.
  proxy_nameservers:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query


# =====================================================================
# 策略组 (Policy Groups)
# ---------------------------------------------------------------------
# 层 1: 总入口 Proxy
# 层 2: 业务专用组(AI/Gemini/YouTube/Netflix/Spotify/TikTok/TG/IG/X/...)
# 层 3: 测速基础设施(AutoSelect/StableSelect/地区池/稳定地区池)
# 防抖: 长连接业务(IG/X)走稳定池不主动漂移; 短交互走 auto_test.
# =====================================================================
policy_groups:
  # 订阅源(节点凭据由用户在 App 内手动添加, 配置不内嵌 token)
  - external:
      name: 订阅
      type: select
      urls: []
      icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/02ProxySoftLogo/Egern.png
      hidden: false

  # 总入口
  - select:
      name: Proxy
      policies:
        - AutoSelect
        - StableSelect
        - 香港
        - 台湾
        - 日本
        - 新加坡
        - 美国
        - DIRECT
      hidden: false

  # ── 测速基础设施 ──
  - auto_test:
      name: AutoSelect
      policies:
        - 订阅
      flatten: true
      filter: ^(?!.*(?:剩余|到期|过期|官网|流量|套餐|网站|售后|客服|更新|Expire|Traffic|Reset|GB|MB)).*$
      interval: 600
      tolerance: 200
      timeout: 3
      icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/Twoandz9/Auto.png
      hidden: false

  - fallback:
      name: StableSelect
      policies:
        - 订阅
      flatten: true
      filter: ^(?!.*(?:剩余|到期|过期|官网|流量|套餐|网站|售后|客服|更新|Expire|Traffic|Reset|GB|MB)).*$
      interval: 900
      timeout: 3
      icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/Twoandz9/Fast.png
      hidden: false

  # ── 地区节点池(同地区内可切换, 不跨地区漂移) ──
  - auto_test:
      name: 香港
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇭🇰|HK|HongKong|Hong Kong|hong kong|香港|深港|沪港|京港|HKG
      interval: 600
      tolerance: 200
      timeout: 3
      icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/HK_02.png
      hidden: false

  - auto_test:
      name: 台湾
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇹🇼|TW|TWN|Taiwan|Taipei|taiwan|台湾|台灣|台北|台中|新北|彰化
      interval: 600
      tolerance: 200
      timeout: 3
      icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/CN.png
      hidden: false

  - auto_test:
      name: 日本
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇯🇵|JP|Japan|japan|Tokyo|tokyo|Osaka|日本|东京|大阪|京日|苏日|沪日|上日|川日|深日|广日
      interval: 600
      tolerance: 200
      timeout: 3
      icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/JP_01.png
      hidden: false

  - auto_test:
      name: 新加坡
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇸🇬|SG|SGP|Singapore|singapore|新加坡|狮城|沪新|京新|深新|杭新|广新
      interval: 600
      tolerance: 200
      timeout: 3
      icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/SG_01.png
      hidden: false

  - auto_test:
      name: 美国
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇺🇸|US|USA|America|america|United States|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|LosAngeles|SiliconValley
      interval: 600
      tolerance: 200
      timeout: 3
      icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/US.png
      hidden: false

  # ── 稳定地区池(interval=900/tolerance=300, IG/X 长连接专用, 防漂移) ──
  - auto_test:
      name: 美国稳定
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇺🇸|US|USA|America|america|United States|美国|凤凰城|洛杉矶|西雅图|芝加哥|纽约|沪美|LosAngeles|SiliconValley
      interval: 900
      tolerance: 300
      timeout: 3
      hidden: true

  - auto_test:
      name: 日本稳定
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇯🇵|JP|Japan|japan|Tokyo|tokyo|Osaka|日本|东京|大阪|京日|苏日|沪日|上日|川日|深日|广日
      interval: 900
      tolerance: 300
      timeout: 3
      hidden: true

  - auto_test:
      name: 新加坡稳定
      policies:
        - 订阅
      flatten: true
      filter: (?i)🇸🇬|SG|SGP|Singapore|singapore|新加坡|狮城|沪新|京新|深新|杭新|广新
      interval: 900
      tolerance: 300
      timeout: 3
      hidden: true

  - fallback:
      name: StableFallback
      policies:
        - 美国稳定
        - 日本稳定
        - 新加坡稳定
      interval: 900
      timeout: 3
      hidden: true

  # ── 业务专用组 ──

  # AI (用户偏好: 新加坡)
  - select:
