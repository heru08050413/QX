#   背景: 国内 App 去广告原有四套覆盖重叠(Daily / blockAds / 小红书专项
#   / NobyDa). 模块越多, MITM 注入 host 越多, 解密+JS 唤醒开销越大, 与
#   "低功耗"相悖. 按 CLAUDE.md 要求去重: 保 blockAds(覆盖最广)+ 小红书
#   专项 + B站 BiliUniverse + 微博 zmqcherish; 关 Daily / NobyDa.
#   预期: 功耗↓、MITM 注入面↓, 去广告覆盖几乎不减(blockAds 已覆盖最广).
#   如发现个别 App 广告回潮, 可单独重开对应模块定位.
#
# 回滚: 规则集/脚本异常时, 把 URL 里的 /master/ 改 /release/(blackmatrix7)
#   或 fork 后锁 commit hash(zmqcherish/ddgksf2013).
# =====================================================================
