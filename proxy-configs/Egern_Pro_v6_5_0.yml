# =====================================================================
# MITM — 严格化(excludes 优先级高于 includes, 也高于模块注入的 hostname)
# ---------------------------------------------------------------------
# ⚠️⚠️ 立刻修改 ca_passphrase ⚠️⚠️
#   当前 'egern' 是默认口令. 请在 Egern App 内重新生成 egern.p12 并改成
#   你自己的强口令. 否则任何拿到该 p12 的人都能解密你 MITM 的全部站点.
# =====================================================================
mitm:
  ca_p12: egern.p12
  ca_passphrase: egern        # ← 务必改成你自己的强口令

  hostnames:
    # ── 显式排除高敏感子域(登录/支付/账户; 降低攻击面) ──
    excludes:
      - passport.weibo.cn
      - login.sina.com.cn
      - security.weibo.cn
      - pay.weibo.cn
      - account.bilibili.com
      - passport.bilibili.com
      - pay.bilibili.com
      - account.zhihu.com
      - account.amap.com
      - wallet.amap.com
      - pay.amap.com
      - wx1.sinaimg.cn
      - wx2.sinaimg.cn
      - wx3.sinaimg.cn
      - wx4.sinaimg.cn
      - tva1.sinaimg.cn
      - tva2.sinaimg.cn
      - tva3.sinaimg.cn
      - tva4.sinaimg.cn
      - ww1.sinaimg.cn
      - ww2.sinaimg.cn
      - ww3.sinaimg.cn
      - ww4.sinaimg.cn
      - us.sinaimg.cn
      - video.weibocdn.com
      # 银行/支付(绝对禁止 MITM)
      - '*.alipay.com'
      - '*.unionpay.com'
      - '*.95516.com'
      - '*.cmbchina.com'
      - '*.ccb.com'
      - '*.icbc.com.cn'
      - '*.bankcomm.com'
      - '*.pingan.com'
      # 苹果敏感
      - '*.icloud.com'
      - '*.apple.com.akadns.net'

      # ── 大流量 CDN 强制纯转发(零解密开销) ──
      # B 站视频/图片 CDN
      - 'upos-sz-mirrorcos.bilivideo.com'
      - 'upos-sz-mirroraliov.bilivideo.com'
      - 'upos-sz-estgcos.bilivideo.com'
      - 'upos-hz-mirrorakam.akamaized.net'
      - '*.bilivideo.com'
      - '*.bilivideo.cn'
      - 'i0.hdslb.com'
      - 'i1.hdslb.com'
      - 'i2.hdslb.com'
      - 's1.hdslb.com'
      - 's2.hdslb.com'
      - 's3.hdslb.com'
      # 小红书图片/视频 CDN(与 edith API 不冲突)
      - 'ci.xiaohongshu.com'
      - 'picasso-static.xiaohongshu.com'
      - 'sns-img-bd.xhscdn.com'
      - 'sns-img-hw.xhscdn.com'
      - 'sns-img-qc.xhscdn.com'
      - 'sns-video-bd.xhscdn.com'
      - 'sns-video-hw.xhscdn.com'
      - 'sns-video-qc.xhscdn.com'
      - 'sns-na-i1.xhscdn.com'
      - 'sns-na-i2.xhscdn.com'
      - 'sns-na-i3.xhscdn.com'
      # 抖音/西瓜 CDN
      - '*.douyinpic.com'
      - '*.douyincdn.com'
      - '*.douyinvod.com'
      - '*.bytecdntp.com'
      # 知乎图片/视频 CDN
      - 'pic1.zhimg.com'
      - 'pic2.zhimg.com'
      - 'pic3.zhimg.com'
      - 'pic4.zhimg.com'
      - 'vdn.zhimg.com'
      - 'vdn3.zhimg.com'
      - 'vdn6.zhimg.com'
      # 微信外联媒体 CDN
      - 'mmbiz.qpic.cn'
      - 'mmbiz.qlogo.cn'
      - 'res.wx.qq.com'
      # 京东图片 CDN
      - 'm.360buyimg.com'
      - 'img10.360buyimg.com'
      - 'img11.360buyimg.com'
      - 'img12.360buyimg.com'
      - 'img13.360buyimg.com'
      - 'img14.360buyimg.com'
      - 'img20.360buyimg.com'
      - 'img30.360buyimg.com'
      # 注[v6.3.0]: *.googlevideo.com 已从 excludes 移除并移入 includes —
      #   Maasea 模块需对它做 URL-rewrite 拦广告流(initplayback&oad), 若
      #   exclude 则模块失效. 仅 URL 层处理, 不解密视频 body, 能效小幅增加.
      # Spotify 音频流 CDN
      - 'audio-fa.scdn.co'
      - 'audio4-fa.scdn.co'
      - 'heads-fa.scdn.co'
      - 'i.scdn.co'
      - 'mosaic.scdn.co'
      # Apple 媒体 CDN
      - '*.itunes.apple.com'
      - '*.mzstatic.com'
      - '*.aaplimg.com'

    # ── 精确解密清单(仅列实际有脚本/改写需求的 host) ──
    includes:
      # 微博(脚本去广告)
      - '*.weibo.cn'
      - '*.weibo.com'
      - '*.weibo.com.cn'
      - '*.weibocdn.com'
      - '*.sina.cn'
      - '*.sina.com.cn'
      - '*.sinajs.cn'
      # B 站(仅 API 域)
      - app.bilibili.com
      - api.bilibili.com
      - api.live.bilibili.com
      - api.vc.bilibili.com
      - manga.bilibili.com
      - grpc.biliapi.net
      # 微信公众号去广告
      - mp.weixin.qq.com
      # 知乎(仅 API)
      - api.zhihu.com
      # 高德(广告接口)
      - '*.amap.com'
      # YouTube 去广告(v6.3.0 对齐 Maasea 模块的完整解密范围):
      #   youtubei = API 响应改写(界面广告位/浮窗解锁)
      #   *.googlevideo.com = URL-rewrite 拦广告流(initplayback&oad), 仅
      #     处理 URL 不解密视频 body; 配合 rules 段 0.6 的 QUIC-reject 生效
      #   www/s.youtube.com = 广告统计/计数信标(REJECT, 见 url_rewrites)
      #   注: 这三者 QUIC 均已在 rules 0.6 被 reject 强制 TCP, 否则 MITM
      #   碰不到(QUIC 走 UDP, MITM 只能处理 TCP).
      - youtubei.googleapis.com
      - '*.googlevideo.com'
      - www.youtube.com
      - s.youtube.com
      # Spotify 去广告
      - spclient.wg.spotify.com
      # 国内 App 开屏广告改写
      - edith.xiaohongshu.com
      - api.m.jd.com
      - api.pinduoduo.com
      - apiv4.yangkeduo.com
      - flowplus.meituan.net
      - interface.music.163.com
      - t7z.cupid.iqiyi.com
      - lives.l.qq.com
      - live.l.qq.com
      - mobile.api.hunantv.com
      - gateway.12306.cn
      - api.udache.com


